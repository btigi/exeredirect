name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release asset
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ExeRedirector.sln

      - name: Build
        run: dotnet build src/ExeRedirector.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/ExeRedirector.csproj --configuration Release --no-build --output $env:RUNNER_TEMP/publish

      - name: Zip publish output
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          $safeTag = $env:RELEASE_TAG -replace '[\\/:*?"<>|]', '-'
          $zipPath = Join-Path $env:RUNNER_TEMP "ExeRedirector-$safeTag.zip"
          Compress-Archive -Path "$env:RUNNER_TEMP/publish/*" -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Attach zip to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload $env:RELEASE_TAG $env:ZIP_PATH --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ExeRedirector
          path: ${{ env.ZIP_PATH }}
